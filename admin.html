<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Festival Junino - Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <strong>Festival Junino</strong>
      <span>EE Profª Maria da Graça Nogueira</span>
    </div>
  </div>

  <section id="loginBox" class="box login-card">
    <h2>Entrar como Admin</h2>

    <label>Senha do Admin
      <input id="adminSenha" type="password" placeholder="Senha" />
    </label>

    <button id="btnLoginAdmin" class="primary">Entrar</button>
    <p id="loginAviso" class="aviso"></p>
  </section>

  <main id="appAdmin" class="app hidden">
<section class="mapa-card">



  <div class="mapa-wrap">
    ...
  </div>
      <div class="mapa-wrap">
        <img src="assets/croqui.png" alt="Croqui do Festival Junino" id="croquiImg" />

        <div id="overlayMesas"></div>

        <div id="overlayInfo">
          <div id="txtValor" class="info-img valor"></div>
          <div id="txtData" class="info-img data"></div>
          <div id="txtHorario" class="info-img horario"></div>
          <div id="txtLocal" class="info-img local"></div>
          <div id="txtAtualizacao" class="info-img atualizacao"></div>
          <div id="txtVendedores" class="vendedores-img"></div>
        </div>
      </div>

      <div class="legenda">
        <span><i class="dot livre"></i> Livre</span>
        <span><i class="dot reservada"></i> Reservada</span>
        <span><i class="dot pendente"></i> Aguardando validação</span>
        <span><i class="dot vendida"></i> Vendida</span>
      </div>
    </section>

    <aside class="painel">
      <section class="box admin-tools">
        <h2>Ações rápidas</h2>
        <button id="btnAtualizar" class="primary">Atualizar</button>
        <button id="btnExportar">Exportar TXT</button>
        <button id="btnZerar" class="danger">Zerar vendas</button>
      </section>

      <section class="box destaque">
        <h2>Configurações do Evento</h2>

        <label>Valor da mesa
          <input id="valorMesa" />
        </label>

        <label>Data
          <input id="dataEvento" />
        </label>

        <label>Horário
          <input id="horarioEvento" />
        </label>

        <label>Local
          <input id="localEvento" />
        </label>

        <label>Última atualização
          <input id="ultimaAtualizacao" />
        </label>

        <label class="check-admin">
          <input type="checkbox" id="clientePodeComprar" />
          Permitir compra direta pelo cliente
        </label>

        <button id="salvarInfo" class="primary">Salvar informações</button>
      </section>

      <section class="box vendedores-box">
        <h2>Vendedores</h2>

        <div class="linha-add">
          <input id="novoVendedor" placeholder="Nome" />
          <input id="novoTelefone" placeholder="Telefone" />
          <input id="novoPin" placeholder="PIN" />
          <button id="addVendedor">+</button>
        </div>

        <div id="listaVendedores"></div>
        <p class="hint">O PIN será usado no login do vendedor.</p>
      </section>

      <section class="box">
        <h2>Resumo</h2>
        <div id="resumo"></div>
      </section>
    </aside>
  </main>

  <dialog id="modalMesa">
    <form method="dialog" class="modal">
      <h2 id="tituloMesa">Mesa</h2>

      <label>Status
        <select id="mesaStatus">
          <option value="livre">Livre</option>
          <option value="reservada">Reservada</option>
          <option value="vendida">Vendida</option>
        </select>
      </label>

      <label>Comprador
        <input id="mesaComprador" />
      </label>

      <label>Contato
        <input id="mesaContato" />
      </label>

      <label>Vendedor
        <select id="mesaVendedor"></select>
      </label>

      <label>Pagamento
        <select id="mesaPagamento">
          <option value="">Selecione</option>
          <option value="Pix">Pix</option>
          <option value="Transferência">Transferência</option>
          <option value="Espécie">Espécie</option>
          <option value="Reservado por 24 horas">Reservado por 24 horas</option>
        </select>
      </label>

      <label>Comprovante
        <input id="mesaComprovante" type="file" accept="image/*,.pdf" />
      </label>

      <p id="nomeComprovante" class="hint"></p>
      <p id="linkComprovante" class="hint"></p>

      <div id="validacaoBox" class="validacao-box">
        <p><strong>Compra pendente de validação.</strong></p>
        <button id="btnValidarCompra" class="primary">Validar compra</button>
        <button id="btnRejeitarCompra" class="danger">Rejeitar compra</button>
      </div>

      <div class="modal-actions">
        <button id="salvarMesa" value="cancel" class="primary">Salvar</button>
        <button id="btnExcluirMesa" class="danger">Excluir</button>
        <button id="cancelarMesa" value="cancel">Cancelar</button>
      </div>

      <p id="avisoMesa" class="aviso"></p>
    </form>
  </dialog>

  <div class="fab-menu">
    <div id="fabOptions" class="fab-options">
      <a href="index.html">👤 Cliente</a>
      <a href="vendedor.html">🧑‍💼 Vendedor</a>
      <a href="admin.html">🔐 Admin</a>
    </div>

    <button id="fabBtn" class="fab-main" type="button" aria-label="Abrir menu">+</button>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="common.js"></script>
  <script src="admin.js"></script>
</body>
</html>
